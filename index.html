/* ---------- Date helpers ---------- */
function dateToKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function todayKey(){ return dateToKey(new Date()); }
function keyToDate(key){ const [y,m,d]=key.split("-").map(Number); return new Date(y,m-1,d); }
function formatDateLabel(key){
  const d = keyToDate(key);
  const days = ["일","월","화","수","목","금","토"];
  return `${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
}
function shiftDateKey(key, delta){ const d = keyToDate(key); d.setDate(d.getDate()+delta); return dateToKey(d); }
function sortByName(arr){ return [...arr].sort((a,b) => a.name.localeCompare(b.name, "ko")); }

const WEEKDAYS = ["월","화","수","목","금","토","일"];
function getWeekdayKorean(key){
  const d = keyToDate(key);
  const map = ["일","월","화","수","목","금","토"];
  return map[d.getDay()];
}
function isScheduledDay(resident, dateKey){
  if (!resident.schedule || resident.schedule.length === 0) return true;
  return resident.schedule.includes(getWeekdayKorean(dateKey));
}
const SCHEDULE_OVERRIDES = {
  "김태영": ["수","목","금"],
  "정숙자": ["월","화","목"],
  "강귀화": ["화","수","목"],
  "강정자": ["월","수","금"],
  "임춘자1": ["월","수","금"],
  "김상순": ["화","목","토"],
  "이숙조": ["화","목","토"],
};
function applyScheduleOverrides(residents){
  return residents.map(r =>
    (r.schedule === undefined && SCHEDULE_OVERRIDES[r.name])
      ? { ...r, schedule: SCHEDULE_OVERRIDES[r.name] }
      : r
  ).map(r => r.name === "임춘자2" ? { ...r, schedule: [] } : r);
}

function showSaveState(state){
  const el = document.getElementById("saveIndicator");
  el.classList.remove("error");
  if (state === "saving") { el.textContent = "저장 중..."; el.classList.add("show"); }
  else if (state === "saved") { el.textContent = "저장됨 ✓"; el.classList.add("show"); clearTimeout(saveTimer); saveTimer = setTimeout(()=>el.classList.remove("show"), 1200); }
  else if (state === "error") { el.textContent = "저장 실패 (다시 시도해주세요)"; el.classList.add("error","show"); clearTimeout(saveTimer); saveTimer = setTimeout(()=>el.classList.remove("show"), 2500); }
}

function persist(key, value){
  showSaveState("saving");
  try {
    lsSet(key, JSON.stringify(value));
    showSaveState("saved");
  } catch(e) {
    showSaveState("error");
  }
}
function debouncedPersist(key, value){
  if (debounceTimers[key]) clearTimeout(debounceTimers[key]);
  debounceTimers[key] = setTimeout(()=>persist(key, value), 350);
}

function loadAll(){
  try {
    const r = lsGet("residents");
    const parsed = r ? JSON.parse(r) : [];
    S.residents = migrateVehicleNames(applyScheduleOverrides((parsed && parsed.length > 0) ? parsed : DEFAULT_RESIDENTS));
  } catch(e) { S.residents = migrateVehicleNames(applyScheduleOverrides(DEFAULT_RESIDENTS)); }
  try {
    const a = lsGet("attendance");
    if (a) S.attendance = JSON.parse(a);
  } catch(e) {}
  try {
    const m = lsGet("meals");
    if (m) S.meals = JSON.parse(m);
  } catch(e) {}
  S.loaded = true;
  debouncedPersist("residents", S.residents);
  render();
}

function computeCounts(){
  const counts = { present: 0, absent: 0, expected: 0 };
  const today = S.attendance[S.selectedDate] || {};
  S.residents.forEach(r => { const s = today[r.id]; if (s) counts[s]++; });
  return counts;
}

function downloadBlob(blob, filename){
  // iOS 홈화면 앱 모드에서는 공유 시트를 통해 저장 (파일 앱, 메일 등으로 보낼 수 있음)
  try {
    if (navigator.canShare && window.File) {
      const file = new File([blob], filename, { type: blob.type });
      if (navigator.canShare({ files: [file] })) {
        navigator.share({ files: [file], title: filename }).catch(() => fallbackDownload(blob, filename));
        return;
      }
    }
  } catch (e) { /* 무시하고 아래 방식으로 */ }
  fallbackDownload(blob, filename);
}

function fallbackDownload(blob, filename){
  const url = URL.createObjectURL(blob);
  // 새 탭으로 열기 (iOS Safari에서 다운로드 대신 표시되면 사용자가 공유버튼으로 저장 가능)
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.target = "_blank";
  a.rel = "noopener";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => {
    // 클릭이 안 먹은 경우 대비: 새 창으로 직접 열기
    try { window.open(url, "_blank"); } catch(e) {}
    setTimeout(() => URL.revokeObjectURL(url), 4000);
  }, 300);
}

function exportAsCSV(dateKey, dateLabel, todayAttendance, todayMeals, counts, absentNames, expectedNames){
  const rows = [];
  rows.push(["서구케어재가노인주간보호센터"]);
  rows.push(["날짜", dateLabel]);
  rows.push([]);
  rows.push(["구분", "인원수"]);
  rows.push(["전체 인원", S.residents.length]);
  rows.push(["출석", counts.present]);
  rows.push(["결석", counts.absent]);
  rows.push(["등원예정", counts.expected]);
  rows.push([]);
  FLOORS.forEach(f => rows.push([f + " 조식", todayMeals[f] || 0]));
  rows.push([]);
  rows.push(["결석자", absentNames.length ? absentNames.join(", ") : "없음"]);
  rows.push(["등원예정자", expectedNames.length ? expectedNames.join(", ") : "없음"]);
  rows.push([]);
  rows.push(["이름", "층", "상태", "하원차량"]);
  S.residents.forEach(r => {
    rows.push([
      r.name,
      r.floor,
      todayAttendance[r.id] ? STATUS[todayAttendance[r.id]].label : "미체크",
      r.vehicle,
    ]);
  });

  const csv = rows.map(row =>
    row.map(cell => {
      const s = String(cell === undefined || cell === null ? "" : cell);
      return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
    }).join(",")
  ).join("\r\n");

  // BOM 추가해서 엑셀에서 한글 안 깨지게
  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  downloadBlob(blob, `출석현황_${dateKey}.csv`);
}

function exportToExcel(){
  try {
    const dateKey = S.selectedDate;
    const dateLabel = formatDateLabel(dateKey);
    const todayAttendance = S.attendance[dateKey] || {};

    exportAsCSV(dateKey, dateLabel, todayAttendance, todayMeals, counts, absentNames, expectedNames);
  } catch (e) {
    console.error(e);
    alert("내보내기에 실패했어요: " + (e && e.message ? e.message : e));
  }
}

          <div class="meal-summary-box">
            <div style="font-size:13px;font-weight:700;color:#7A6238;">${f} 조식</div>
            <div style="font-size:22px;font-weight:800;color:#7A6238;margin-top:4px;">${todayMeals[f]||0}개</div>
          </div>
        `).join("")}
      </div>
    `;
  } else {
    const floor = FLOORS[S.page - 1];
    const list = sortByName(S.residents.filter(r => r.floor === floor));
    inner = `
      <div class="slide-date">${floor} 어르신 현황</div>
      <div class="slide-title">총 ${list.length}명</div>
      ${list.length === 0 ? `<div style="text-align:center;color:#9E9C96;padding:30px;font-size:13px;">등록된 어르신이 없어요</div>` :
        list.map(r => {
          const s = todayAttendance[r.id];
          return `
            <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:12px;background:${s?STATUS[s].bg:"#F5F3EE"};margin-bottom:8px;">
              <span style="font-size:16px;font-weight:700;">${esc(r.name)}</span>
              <span style="font-size:12px;font-weight:700;color:${s?STATUS[s].color:"#B8B6AE"};">${s?STATUS[s].label:"미체크"}</span>
            </div>
          `;
        }).join("")
      }
    `;
  }

  return `
    <div class="slide-card">${inner}</div>
    <div class="slide-nav">
      <button class="slide-nav-btn" ${S.page===0?"disabled":""} onclick="gotoPage(${S.page-1})">‹ 이전</button>
      <div class="dots">
        ${[0,1,2].map(i => `<div class="dot ${i===S.page?"active":""}" onclick="gotoPage(${i})"></div>`).join("")}
      </div>
      <button class="slide-nav-btn" ${S.page===2?"disabled":""} onclick="gotoPage(${S.page+1})">다음 ›</button>
    </div>
    <button class="export-btn" onclick="exportToExcel()"><span>⬇️</span><span>파일로 내보내기 (엑셀)</span></button>
  `;
}

/* ---------- Main render ---------- */
function renderSearchBar(){
  return `
    <div style="display:flex;align-items:center;gap:8px;background:#fff;border:2px solid #ECEAE5;border-radius:12px;padding:8px 12px;margin-bottom:14px;">
      <span style="font-size:15px;">🔍</span>
      <input id="searchInput" placeholder="이름 검색" value="${esc(S.search)}" oninput="updateSearch(this.value)"
        style="flex:1;border:none;outline:none;font-size:15px;background:transparent;color:#343432;" />
      ${S.search ? `<button onclick="clearSearch()" style="border:none;background:#EFEDE8;border-radius:50%;width:22px;height:22px;font-size:13px;color:#9E9C96;">✕</button>` : ""}
    </div>
  `;
}

function renderSearchResults(){
  const todayAttendance = S.attendance[S.selectedDate] || {};
  const q = S.search.trim();
  const matches = S.residents
    .filter(r => r.name.includes(q))
    .sort((a, b) => {
      if (a.floor !== b.floor) return a.floor.localeCompare(b.floor, "ko");
      return a.name.localeCompare(b.name, "ko");
    });

  if (matches.length === 0) {
    return `<div class="floor-empty">"${esc(q)}" 검색 결과가 없어요</div>`;
  }

  return matches.map(r => {
    const current = todayAttendance[r.id];
    const borderColor = current ? STATUS[current].color : "#ECEAE5";
    const bg = current ? STATUS[current].bg : "#fff";
    const btns = Object.entries(STATUS).map(([key, s]) => {
      const active = current === key;
      return `
        <button class="status-btn" style="border-color:${active ? s.color : "#DEDBD3"};background:${active ? s.color : "#fff"};color:${active ? "#fff" : "#5A5852"};" onclick="setStatus('${r.id}','${key}')">
          <span>${s.icon}</span><span>${s.label}</span>
        </button>
      `;
    }).join("");
    return `
      <div class="resident-row" style="border-color:${borderColor};background:${bg};">
        <div style="flex-shrink:0;min-width:64px;">
          <div class="resident-name" style="margin:0;">${esc(r.name)}</div>
          <div style="font-size:10px;font-weight:700;color:#9E9C96;margin-top:1px;">${r.floor}${r.night ? " · 야간" : ""}</div>
        </div>
        <div class="status-group">${btns}</div>
      </div>
    `;
  }).join("");
}

function renderStatusModal(){
  if (!S.statusModal) return "";
  const status = S.statusModal;
  const s = STATUS[status];
  const todayAttendance = S.attendance[S.selectedDate] || {};
  const list = S.residents
    .filter(r => todayAttendance[r.id] === status)
    .sort((a, b) => {
      if (a.floor !== b.floor) return a.floor.localeCompare(b.floor, "ko");
      return a.name.localeCompare(b.name, "ko");
    });

  const byFloor = FLOORS.map(floor => {
    const fl = list.filter(r => r.floor === floor);
    if (fl.length === 0) return "";
    const names = fl.map(r => `
      <div style="display:inline-flex;align-items:center;gap:4px;background:${s.bg};border:1.5px solid ${s.color};border-radius:10px;padding:6px 10px;margin:0 6px 6px 0;">
        <span style="font-size:14px;font-weight:700;color:#343432;">${esc(r.name)}</span>
        ${r.night ? `<span style="font-size:10px;font-weight:800;color:#5C4463;">야간</span>` : ""}
      </div>
    `).join("");
    return `
      <div style="margin-bottom:14px;">
        <div style="font-size:13px;font-weight:800;color:#5A5852;margin-bottom:8px;">${floor} · ${fl.length}명</div>
        <div style="display:flex;flex-wrap:wrap;">${names}</div>
      </div>
    `;
  }).join("");

  return `
    <div onclick="closeStatusList()" style="position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;display:flex;align-items:flex-end;justify-content:center;">
      <div onclick="event.stopPropagation()" style="background:#F8F7F4;width:100%;max-width:600px;border-top-left-radius:20px;border-top-right-radius:20px;padding:20px;max-height:75vh;overflow-y:auto;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:20px;font-weight:800;color:${s.color};">${s.label}</span>
            <span style="font-size:16px;font-weight:700;color:#9E9C96;">${list.length}명</span>
          </div>
          <button onclick="closeStatusList()" style="border:none;background:#EFEDE8;border-radius:50%;width:32px;height:32px;font-size:16px;color:#5A5852;">✕</button>
        </div>
        ${list.length === 0 ? `<div style="text-align:center;color:#9E9C96;padding:30px;font-size:14px;">${s.label} 어르신이 없어요</div>` : byFloor}
      </div>
    </div>
  `;
}

function renderResetConfirm(){
  if (!S.confirmReset) return "";
  const label = formatDateLabel(S.selectedDate);
  return `
    <div onclick="cancelResetDay()" style="position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;">
      <div onclick="event.stopPropagation()" style="background:#F8F7F4;width:100%;max-width:340px;border-radius:20px;padding:24px;text-align:center;">
        <div style="font-size:34px;margin-bottom:10px;">⚠️</div>
        <div style="font-size:18px;font-weight:800;color:#343432;margin-bottom:8px;">기록을 초기화할까요?</div>
        <div style="font-size:14px;color:#7A7872;line-height:1.5;margin-bottom:20px;">
          <b>${label}</b>의 출석·조식 기록이 모두 지워져요.<br>어르신 명단과 차량 배정은 그대로 유지돼요.
        </div>
        <div style="display:flex;gap:10px;">
          <button onclick="cancelResetDay()" style="flex:1;padding:13px;border-radius:12px;border:2px solid #DEDBD3;background:#fff;color:#5A5852;font-size:15px;font-weight:700;">취소</button>
          <button onclick="doResetDay()" style="flex:1;padding:13px;border-radius:12px;border:none;background:#C98D74;color:#fff;font-size:15px;font-weight:700;">초기화</button>
        </div>
      </div>
    </div>
  `;
}

function render(){
  const app = document.getElementById("app");
  if (!S.loaded) {
    app.innerHTML = renderHeader() + renderTabs() + `<div class="content"><div class="empty-box">불러오는 중...</div></div>`;
    return;
  }

  const isToday = S.selectedDate === todayKey();
  const searchable = (S.tab === "slides" || S.tab === "floor2" || S.tab === "floor3" || S.tab === "vehicle");
  let body = "";
  if (S.residents.length === 0 && S.tab !== "roster") {
    body = renderEmptyState();
  } else if (searchable && S.search.trim()) {
    body = renderSearchBar() + renderSearchResults();
  } else if (S.tab === "slides") {
    body = renderSearchBar() + renderSlides();
  } else if (S.tab === "floor2") {
    body = renderSearchBar() + renderFloorTab("2층");
  } else if (S.tab === "floor3") {
    body = renderSearchBar() + renderFloorTab("3층");
  } else if (S.tab === "vehicle") {
    body = renderSearchBar() + renderVehicleTab();
  } else if (S.tab === "roster") {
    body = renderRosterTab();
  }

  const banner = (!isToday && S.tab !== "roster") ? `<div class="date-banner">${formatDateLabel(S.selectedDate)} 기록을 보고 있어요</div>` : "";

  app.innerHTML = renderHeader() + renderTabs() + `<div class="content">${banner}${body}</div>` + renderStatusModal() + renderResetConfirm();

  const nameInput = document.getElementById("newNameInput");
  if (nameInput) {
    nameInput.focus();
    const val = nameInput.value;
    nameInput.value = "";
    nameInput.value = val;
  }
  const searchInput = document.getElementById("searchInput");
  if (searchInput && document.activeElement !== searchInput) {
    // 검색 입력 중 포커스 유지
    const val = searchInput.value;
    searchInput.focus();
    searchInput.value = "";
    searchInput.value = val;
  }
}

loadAll();
</script>
</body>
</html>
